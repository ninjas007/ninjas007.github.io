<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Blog</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="styles/style-blog.css" />
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="certificate.html">Certificate</a></li>
				<li><a href="store.html">Store</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1>Blog</h1>
				<p>
					Dummy list postingan seputar IT (Git, Laragon, REST API,
					deployment, dan lain-lain). Nanti bisa dikembangkan ke
					halaman artikel detail.
				</p>
				<div class="hero-buttons">
					<a href="index.html" class="btn btn-secondary">Back Home</a>
					<a href="index.html#contact" class="btn btn-primary"
						>Get In Touch</a
					>
				</div>
			</section>

			<section class="section" id="posts">
				<div class="section-title-wrapper">
					<h2 class="section-title">Posts</h2>
				</div>

				<div class="cv-main" id="postsList" aria-live="polite">
					<div style="color: var(--muted); font-size: 14px">
						Loading posts...
					</div>
				</div>

				<div class="hero-buttons" style="justify-content: center">
					<button
						id="loadMoreBtn"
						class="btn btn-secondary"
						type="button"
						style="display: none"
					>
						Load More
					</button>
				</div>
			</section>
		</div>

		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			const PAGE_SIZE = 20;
			let allPosts = [];
			let renderedCount = 0;

			function renderNextPage() {
				const container = document.getElementById("postsList");
				const btn = document.getElementById("loadMoreBtn");
				if (!container || !btn) return;

				const slice = allPosts.slice(renderedCount, renderedCount + PAGE_SIZE);
				for (const item of slice) {
					const slug = item.slug || "post";
					const url = item.url || item.article_url || "#";
					const tags = Array.isArray(item.tags) ? item.tags.filter(Boolean) : [];
					const isExternal = /^https?:\/\//i.test(url);

					const card = document.createElement("div");
					card.className = "experience-card";
					card.id = `post-${slug}`;

					const titleWrap = document.createElement("div");
					titleWrap.className = "experience-title";

					const link = document.createElement("a");
					link.href = url;
					link.textContent = item.title || url;
					if (isExternal) {
						link.target = "_blank";
						link.rel = "noreferrer";
					}
					titleWrap.appendChild(link);

					const meta = document.createElement("div");
					meta.className = "experience-company";
					const parts = [];
					if (tags.length) parts.push(tags.slice(0, 3).join(" \u2022 "));
					if (item.type === "video") parts.push("Video");
					if (item.publish) parts.push(item.publish);
					meta.textContent = parts.filter(Boolean).join(" \u2022 ");

					card.appendChild(titleWrap);
					card.appendChild(meta);
					container.appendChild(card);
				}

				renderedCount += slice.length;

				if (renderedCount < allPosts.length) {
					btn.style.display = "inline-block";
					btn.disabled = false;
					btn.textContent = "Load More";
				} else {
					btn.style.display = "none";
				}
			}

			async function loadPosts() {
				const container = document.getElementById("postsList");
				const btn = document.getElementById("loadMoreBtn");
				try {
					const res = await fetch("data/articles.json", {
						cache: "no-store",
					});
					if (!res.ok) throw new Error("Failed to fetch articles.json");
					const items = await res.json();

					allPosts = items.slice().sort((a, b) => {
						const ad = a.published_at || a.publish || "";
						const bd = b.published_at || b.publish || "";
						if (ad !== bd) return bd.localeCompare(ad);
						const at = a.type === "video" ? 0 : 1;
						const bt = b.type === "video" ? 0 : 1;
						if (at !== bt) return at - bt;
						return (a.title || "").localeCompare(b.title || "");
					});

					container.innerHTML = "";
					renderedCount = 0;
					renderNextPage();

					if (btn) {
						btn.addEventListener("click", function () {
							btn.disabled = true;
							btn.textContent = "Loading...";
							renderNextPage();
						});
					}

					const hash = decodeURIComponent(window.location.hash || "");
					if (hash && hash.length > 1) {
						const el = document.getElementById(hash.slice(1));
						if (el) {
							el.scrollIntoView({
								behavior: "smooth",
								block: "start",
							});
						}
					}
				} catch (err) {
					container.innerHTML = "";
					if (btn) btn.style.display = "none";
					const msg = document.createElement("div");
					msg.style.color = "var(--muted)";
					msg.style.fontSize = "14px";
					msg.textContent = "Failed to load posts.";
					container.appendChild(msg);
					console.error(err);
				}
			}

			loadPosts();
		</script>
	</body>
</html>
