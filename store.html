<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Store</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="styles/style-store.css" />
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="certificate.html">Certificate</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1>Store</h1>
				<p>
					Dummy store page (sementara): daftar produk yang dijual.
					Nanti bisa diganti dengan produk asli + pembayaran.
				</p>
				<div class="hero-buttons">
					<a href="index.html" class="btn btn-secondary">Back Home</a>
					<a href="mailto:tilistiadi03@gmail.com" class="btn btn-primary"
						>Order via Email</a
					>
				</div>
			</section>

			<section class="section" id="store">
				<div class="section-title-wrapper">
					<h2 class="section-title">Products</h2>
				</div>

				<div class="portfolio-grid" id="storeGrid" aria-live="polite">
					<div style="color: var(--muted); font-size: 14px">Loading...</div>
				</div>
			</section>
		</div>

		<!-- Store Modal -->
		<dialog class="store-modal" id="storeModal" aria-label="Product details">
			<div class="store-modal__header">
				<h3 class="store-modal__title" id="storeModalTitle">Product</h3>
				<button
					type="button"
					class="store-modal__close"
					id="storeModalClose"
					aria-label="Close modal"
				>
					&times;
				</button>
			</div>
			<p class="store-modal__desc" id="storeModalDesc"></p>
			<div class="store-modal__price" id="storeModalPrice"></div>

			<div class="store-modal__slider" aria-label="Product images">
				<button
					type="button"
					class="store-modal__nav"
					id="storeModalPrev"
					aria-label="Previous image"
				>
					&lsaquo;
				</button>

				<div class="store-modal__frame">
					<img class="store-modal__img" id="storeModalImg" alt="" />
					<div class="store-modal__empty" id="storeModalEmpty">
						No images available.
					</div>
				</div>

				<button
					type="button"
					class="store-modal__nav"
					id="storeModalNext"
					aria-label="Next image"
				>
					&rsaquo;
				</button>
			</div>

			<div class="store-modal__dots" id="storeModalDots"></div>

			<div class="store-modal__footer">
				<div class="store-modal__tools" id="storeModalTools">
					<button
						type="button"
						class="btn btn-secondary"
						id="storeModalZoomOut"
						aria-label="Zoom out"
					>
						-
					</button>
					<button
						type="button"
						class="btn btn-secondary"
						id="storeModalZoomIn"
						aria-label="Zoom in"
					>
						+
					</button>
					<button
						type="button"
						class="btn btn-secondary"
						id="storeModalZoomReset"
						aria-label="Reset zoom"
					>
						Reset
					</button>
				</div>
				<a
					href="#"
					class="btn btn-primary"
					id="storeModalOrder"
					target="_blank"
					rel="noreferrer"
					>Order</a
				>
				<button type="button" class="btn btn-secondary" id="storeModalClose2">
					Close
				</button>
			</div>
		</dialog>

		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			// Store modal + slider
			const storeModalEl = document.getElementById("storeModal");
			const storeModalTitleEl = document.getElementById("storeModalTitle");
			const storeModalDescEl = document.getElementById("storeModalDesc");
			const storeModalPriceEl = document.getElementById("storeModalPrice");
			const storeModalImgEl = document.getElementById("storeModalImg");
			const storeModalEmptyEl = document.getElementById("storeModalEmpty");
			const storeModalDotsEl = document.getElementById("storeModalDots");
			const storeModalPrevEl = document.getElementById("storeModalPrev");
			const storeModalNextEl = document.getElementById("storeModalNext");
			const storeModalCloseEl = document.getElementById("storeModalClose");
			const storeModalClose2El = document.getElementById("storeModalClose2");
			const storeModalOrderEl = document.getElementById("storeModalOrder");
			const storeModalToolsEl = document.getElementById("storeModalTools");
			const storeModalZoomOutEl = document.getElementById("storeModalZoomOut");
			const storeModalZoomInEl = document.getElementById("storeModalZoomIn");
			const storeModalZoomResetEl = document.getElementById("storeModalZoomReset");
			const storeModalFrameEl = storeModalEl?.querySelector(".store-modal__frame");
			const storeModalSliderEl = storeModalEl?.querySelector(".store-modal__slider");

			const storeModalState = { item: null, images: [], index: 0, lastFocus: null };
			const storeWhatsappNumber = "6281371458031";
			let storeModalZoom = 1;

			function storeModalApplyZoom(nextZoom, { resetScroll = false } = {}) {
				const total = storeModalState.images.length;
				if (total === 0) return;

				const clamped = Math.min(4, Math.max(1, nextZoom));
				storeModalZoom = Math.round(clamped * 100) / 100;

				if (storeModalZoom === 1) {
					storeModalImgEl.style.width = "100%";
					storeModalImgEl.style.height = "100%";
				} else {
					storeModalImgEl.style.width = `${storeModalZoom * 100}%`;
					storeModalImgEl.style.height = `${storeModalZoom * 100}%`;
				}

				if (resetScroll && storeModalFrameEl) {
					storeModalFrameEl.scrollTop = 0;
					storeModalFrameEl.scrollLeft = 0;
				}
			}

			function storeModalUpdateChrome(total) {
				const single = total <= 1;

				storeModalPrevEl.style.display = single ? "none" : "";
				storeModalNextEl.style.display = single ? "none" : "";
				storeModalDotsEl.style.display = total > 1 ? "" : "none";
				storeModalToolsEl.style.display = total > 0 ? "flex" : "none";
				storeModalSliderEl?.classList.toggle("is-single", single);
			}

			function storeModalSetSlide(nextIndex) {
				const total = storeModalState.images.length;
				storeModalUpdateChrome(total);

				if (total === 0) {
					storeModalState.index = 0;
					storeModalZoom = 1;
					storeModalImgEl.style.display = "none";
					storeModalImgEl.removeAttribute("src");
					storeModalEmptyEl.style.display = "block";
					storeModalDotsEl.innerHTML = "";
					return;
				}

				const normalized = ((nextIndex % total) + total) % total;
				storeModalState.index = normalized;
				const src = storeModalState.images[normalized];

				storeModalEmptyEl.style.display = "none";
				storeModalImgEl.style.display = "block";
				storeModalImgEl.src = encodeURI(src);
				storeModalApplyZoom(1, { resetScroll: true });
				const title = storeModalState.item?.title || "Product";
				storeModalImgEl.alt = `${title} image ${normalized + 1}`;

				for (const dot of storeModalDotsEl.querySelectorAll("button")) {
					const idx = Number(dot.dataset.index);
					dot.setAttribute("aria-current", String(idx === normalized));
				}
			}

			function storeModalRenderDots() {
				storeModalDotsEl.innerHTML = "";
				const total = storeModalState.images.length;
				if (total <= 1) return;

				for (let i = 0; i < total; i++) {
					const dot = document.createElement("button");
					dot.type = "button";
					dot.className = "store-modal__dot";
					dot.dataset.index = String(i);
					dot.setAttribute("aria-label", `Go to image ${i + 1}`);
					dot.setAttribute("aria-current", "false");
					dot.addEventListener("click", () => storeModalSetSlide(i));
					storeModalDotsEl.appendChild(dot);
				}
			}

			function openStoreModal(item) {
				if (!storeModalEl) return;

				storeModalState.lastFocus = document.activeElement;
				storeModalState.item = item || null;
				storeModalState.images = Array.isArray(item?.images) ? item.images.filter(Boolean) : [];
				storeModalState.index = 0;

				storeModalTitleEl.textContent = item?.title || "Untitled";
				storeModalDescEl.textContent = item?.description || "";
				storeModalPriceEl.textContent = item?.price ? `Price: ${item.price}` : "";
				storeModalPriceEl.style.display = item?.price ? "" : "none";

				const message = `Halo, saya mau order: ${item?.title || "produk"}${item?.price ? ` (${item.price})` : ""}.`;
				storeModalOrderEl.href = `https://wa.me/${storeWhatsappNumber}?text=${encodeURIComponent(message)}`;

				storeModalRenderDots();
				storeModalSetSlide(0);

				try {
					storeModalEl.showModal();
				} catch {
					storeModalEl.setAttribute("open", "");
				}

				setTimeout(() => storeModalCloseEl?.focus?.(), 0);
			}

			function closeStoreModal() {
				if (!storeModalEl) return;
				try {
					storeModalEl.close();
				} catch {
					storeModalEl.removeAttribute("open");
				}
			}

			if (storeModalEl) {
				storeModalCloseEl?.addEventListener("click", closeStoreModal);
				storeModalClose2El?.addEventListener("click", closeStoreModal);
				storeModalPrevEl?.addEventListener("click", () =>
					storeModalSetSlide(storeModalState.index - 1),
				);
				storeModalNextEl?.addEventListener("click", () =>
					storeModalSetSlide(storeModalState.index + 1),
				);

				storeModalEl.addEventListener("click", (e) => {
					if (e.target === storeModalEl) closeStoreModal();
				});

				storeModalEl.addEventListener("keydown", (e) => {
					if (e.key === "ArrowLeft") {
						e.preventDefault();
						storeModalSetSlide(storeModalState.index - 1);
					}
					if (e.key === "ArrowRight") {
						e.preventDefault();
						storeModalSetSlide(storeModalState.index + 1);
					}
				});

				storeModalEl.addEventListener("close", () => {
					const el = storeModalState.lastFocus;
					if (el && typeof el.focus === "function") el.focus();
				});

				storeModalZoomOutEl?.addEventListener("click", () =>
					storeModalApplyZoom(storeModalZoom - 0.25),
				);
				storeModalZoomInEl?.addEventListener("click", () =>
					storeModalApplyZoom(storeModalZoom + 0.25),
				);
				storeModalZoomResetEl?.addEventListener("click", () =>
					storeModalApplyZoom(1, { resetScroll: true }),
				);

				storeModalFrameEl?.addEventListener(
					"wheel",
					(e) => {
						if (!e.ctrlKey && !e.metaKey) return;
						e.preventDefault();
						const dir = e.deltaY > 0 ? -0.1 : 0.1;
						storeModalApplyZoom(storeModalZoom + dir);
					},
					{ passive: false },
				);
			}

			async function loadStore() {
				const container = document.getElementById("storeGrid");
				if (!container) return;

				try {
					const res = await fetch("data/store.json", { cache: "no-store" });
					if (!res.ok) throw new Error("Failed to fetch store.json");
					const items = await res.json();

					container.innerHTML = "";
					for (const item of items || []) {
						const tags = Array.isArray(item.tags) ? item.tags : [];
						const images = Array.isArray(item.images) ? item.images : [];

						const card = document.createElement("a");
						card.className = "portfolio-card";
						card.href = "#";
						card.style.textDecoration = "none";
						card.style.color = "inherit";
						card.setAttribute("role", "button");
						card.setAttribute(
							"aria-label",
							`Open details for ${item.title || "product"}`,
						);
						card.addEventListener("click", (e) => {
							e.preventDefault();
							openStoreModal(item);
						});
						card.addEventListener("keydown", (e) => {
							if (e.key === " ") {
								e.preventDefault();
								openStoreModal(item);
							}
						});

						const img = document.createElement("div");
						img.className = "portfolio-image";
						if (images[0]) {
							img.classList.add("portfolio-image--photo");
							img.style.backgroundImage = `url('${encodeURI(images[0])}')`;
							img.textContent = "";
						} else {
							img.textContent = "\u{1F6D2}";
						}

						const content = document.createElement("div");
						content.className = "portfolio-content";

						const h3 = document.createElement("h3");
						h3.textContent = item.title || "Untitled";

						const price = document.createElement("div");
						price.className = "store-price";
						price.textContent = item.price || "";
						price.style.display = item.price ? "" : "none";

						const p = document.createElement("p");
						p.textContent = item.description || "";

						const tagsWrap = document.createElement("div");
						tagsWrap.className = "portfolio-tags";
						for (const t of tags.slice(0, 3)) {
							const tag = document.createElement("span");
							tag.className = "portfolio-tag";
							tag.textContent = t;
							tagsWrap.appendChild(tag);
						}

						content.appendChild(h3);
						content.appendChild(price);
						content.appendChild(p);
						content.appendChild(tagsWrap);

						card.appendChild(img);
						card.appendChild(content);
						container.appendChild(card);
					}
				} catch (err) {
					container.innerHTML = "";
					const msg = document.createElement("div");
					msg.style.color = "var(--muted)";
					msg.style.fontSize = "14px";
					msg.textContent = "Failed to load products.";
					container.appendChild(msg);
					console.error(err);
				}
			}

			loadStore();
		</script>
	</body>
</html>
