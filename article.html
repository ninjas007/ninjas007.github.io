<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Article</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>

		<style>
			:root {
				--bg-0: #0b0f16;
				--bg-1: #0f1523;
				--bg-2: #141b2b;
				--accent-red: #e74c3c;
				--accent-blue: #3498db;
				--accent-gold: #ffd24d;
				--text: #e8edf7;
				--muted: #9aa6c5;
				--panel: #0f1726;
				--panel-border: rgba(255, 255, 255, 0.08);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: "Rajdhani", sans-serif;
				color: var(--text);
				background:
					radial-gradient(
						circle at 20% 10%,
						rgba(255, 255, 255, 0.06),
						transparent 45%
					),
					radial-gradient(
						circle at 85% 30%,
						rgba(52, 152, 219, 0.12),
						transparent 45%
					),
					linear-gradient(
						180deg,
						var(--bg-0),
						var(--bg-1) 55%,
						var(--bg-2)
					);
				min-height: 100vh;
				overflow-x: hidden;
			}

			.navbar {
				position: fixed;
				top: 0;
				width: 100%;
				background: rgba(11, 15, 22, 0.95);
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
				backdrop-filter: blur(10px);
				z-index: 1000;
				padding: 16px 24px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.navbar-brand {
				font-family: "Oswald", sans-serif;
				font-size: 20px;
				font-weight: 700;
				letter-spacing: 0.08em;
				color: var(--accent-gold);
				text-transform: uppercase;
			}

			.navbar-menu {
				display: flex;
				gap: 30px;
				list-style: none;
			}

			.navbar-menu a {
				color: var(--text);
				text-decoration: none;
				font-size: 14px;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				transition: color 0.3s ease;
			}

			.navbar-menu a:hover {
				color: var(--accent-blue);
			}

			.menu-toggle {
				display: none;
				flex-direction: column;
				justify-content: space-between;
				width: 25px;
				height: 20px;
				background: transparent;
				border: none;
				cursor: pointer;
				padding: 0;
			}

			.menu-toggle span {
				display: block;
				height: 3px;
				background: var(--text);
				border-radius: 3px;
			}

			.container {
				max-width: 980px;
				margin: 0 auto;
				padding: 100px 24px 60px;
			}

			.hero {
				text-align: center;
				padding: 40px 0 20px;
				margin-bottom: 18px;
			}

			.hero h1 {
				font-family: "Oswald", sans-serif;
				font-size: 44px;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				margin-bottom: 8px;
				background: linear-gradient(
					135deg,
					var(--accent-gold),
					var(--accent-blue)
				);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}

			.hero p {
				color: var(--muted);
				font-size: 14px;
				letter-spacing: 0.03em;
				max-width: 820px;
				margin: 0 auto;
				line-height: 1.7;
			}

			.hero-buttons {
				display: flex;
				gap: 14px;
				justify-content: center;
				flex-wrap: wrap;
				margin-top: 18px;
			}

			.btn {
				padding: 12px 22px;
				border-radius: 8px;
				border: none;
				font-family: "Oswald", sans-serif;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				font-size: 13px;
				cursor: pointer;
				transition: all 0.3s ease;
				text-decoration: none;
				display: inline-block;
			}

			.btn-primary {
				background: linear-gradient(
					135deg,
					var(--accent-blue),
					var(--accent-gold)
				);
				color: #0b0f16;
			}

			.btn-secondary {
				background: transparent;
				border: 1px solid var(--panel-border);
				color: var(--text);
			}

			.btn-secondary:hover {
				border-color: var(--accent-blue);
				color: var(--accent-blue);
				transform: translateY(-2px);
			}

			.article {
				background: rgba(15, 23, 38, 0.75);
				border: 1px solid var(--panel-border);
				border-radius: 12px;
				padding: 22px 22px;
			}

			.markdown {
				line-height: 1.85;
				color: var(--text);
				font-size: 15px;
			}

			.markdown h1,
			.markdown h2,
			.markdown h3,
			.markdown h4 {
				font-family: "Oswald", sans-serif;
				letter-spacing: 0.04em;
				margin: 22px 0 10px;
				color: var(--accent-gold);
			}

			.markdown p {
				margin: 10px 0;
				color: var(--text);
			}

			.markdown a {
				color: var(--accent-blue);
				text-decoration: none;
			}

			.markdown a:hover {
				text-decoration: underline;
			}

			.markdown code {
				background: rgba(255, 255, 255, 0.06);
				border: 1px solid rgba(255, 255, 255, 0.08);
				padding: 2px 6px;
				border-radius: 6px;
				font-size: 0.95em;
			}

			.markdown pre {
				background: rgba(11, 15, 22, 0.75);
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 10px;
				padding: 14px;
				overflow: auto;
				margin: 14px 0;
			}

			.markdown pre code {
				border: none;
				background: transparent;
				padding: 0;
				border-radius: 0;
			}

			.markdown ul,
			.markdown ol {
				padding-left: 22px;
				margin: 10px 0;
			}

			.markdown blockquote {
				border-left: 3px solid var(--accent-blue);
				padding-left: 14px;
				color: var(--muted);
				margin: 14px 0;
			}

			.markdown img {
				max-width: 100%;
				border-radius: 12px;
				border: 1px solid rgba(255, 255, 255, 0.08);
				margin: 12px 0;
			}

			@media (max-width: 900px) {
				.menu-toggle {
					display: flex;
				}

				.navbar-menu {
					position: fixed;
					top: 64px;
					right: 16px;
					left: 16px;
					background: rgba(11, 15, 22, 0.98);
					border: 1px solid rgba(255, 255, 255, 0.1);
					border-radius: 12px;
					padding: 18px 16px;
					flex-direction: column;
					gap: 16px;
					display: none;
				}

				.navbar-menu.open {
					display: flex;
				}
			}
		</style>
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="blog.html">Blog</a></li>
				<li><a href="store.html">Store</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1 id="articleTitle">Article</h1>
				<p id="articleMeta">Loading...</p>
				<div class="hero-buttons">
					<a href="blog.html" class="btn btn-secondary">Back to Blog</a>
					<a href="index.html" class="btn btn-secondary">Home</a>
				</div>
			</section>

			<div class="article">
				<div class="markdown" id="content" aria-live="polite"></div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			function getParam(name) {
				const url = new URL(window.location.href);
				return url.searchParams.get(name);
			}

			function safeArticlePath(raw) {
				if (!raw) return null;
				const normalized = raw.replace(/\\/g, "/").replace(/^\/+/, "");
				if (!normalized.startsWith("articles/")) return null;
				if (!normalized.endsWith(".md")) return null;
				if (normalized.includes("..")) return null;
				return normalized;
			}

			async function loadArticle() {
				const content = document.getElementById("content");
				const titleEl = document.getElementById("articleTitle");
				const metaEl = document.getElementById("articleMeta");

				const rawPath = getParam("p");
				const path = safeArticlePath(rawPath);
				if (!path) {
					titleEl.textContent = "Invalid article";
					metaEl.textContent = "Missing or invalid parameter.";
					content.textContent = "Please open article from Blog page.";
					return;
				}

				try {
					const res = await fetch(path, { cache: "no-store" });
					if (!res.ok) throw new Error("Failed to fetch markdown");
					const md = await res.text();

					const html = marked.parse(md, {
						mangle: false,
						headerIds: true,
					});
					content.innerHTML = DOMPurify.sanitize(html);

					const h1 = content.querySelector("h1");
					const title =
						(h1 && h1.textContent && h1.textContent.trim()) ||
						path.split("/").pop();
					titleEl.textContent = title;
					document.title = title;
					metaEl.textContent = path;

					// If there's a hash, scroll after render
					const hash = decodeURIComponent(window.location.hash || "");
					if (hash && hash.length > 1) {
						const target = content.querySelector(hash);
						if (target) {
							target.scrollIntoView({
								behavior: "smooth",
								block: "start",
							});
						}
					}
				} catch (err) {
					titleEl.textContent = "Failed to load";
					metaEl.textContent = path;
					content.textContent = "Failed to load article.";
					console.error(err);
				}
			}

			loadArticle();
		</script>
	</body>
</html>
