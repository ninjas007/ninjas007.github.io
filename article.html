<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Article</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="styles/style-article.css" />
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="blog.html">Blog</a></li>
				<li><a href="store.html">Store</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1 id="articleTitle">Article</h1>
				<p id="articleMeta">Loading...</p>
				<div class="hero-buttons">
					<a href="blog.html" class="btn btn-secondary">Back to Blog</a>
					<a href="index.html" class="btn btn-secondary">Home</a>
				</div>
			</section>

			<div class="article">
				<div class="markdown" id="content" aria-live="polite"></div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			function getParam(name) {
				const url = new URL(window.location.href);
				return url.searchParams.get(name);
			}

			function safeArticlePath(raw) {
				if (!raw) return null;
				const normalized = raw.replace(/\\/g, "/").replace(/^\/+/, "");
				if (!normalized.startsWith("articles/")) return null;
				if (!normalized.endsWith(".md")) return null;
				if (normalized.includes("..")) return null;
				return normalized;
			}

			async function loadArticle() {
				const content = document.getElementById("content");
				const titleEl = document.getElementById("articleTitle");
				const metaEl = document.getElementById("articleMeta");

				const rawPath = getParam("p");
				const path = safeArticlePath(rawPath);
				if (!path) {
					titleEl.textContent = "Invalid article";
					metaEl.textContent = "Missing or invalid parameter.";
					content.textContent = "Please open article from Blog page.";
					return;
				}

				try {
					const res = await fetch(path, { cache: "no-store" });
					if (!res.ok) throw new Error("Failed to fetch markdown");
					const md = await res.text();

					const html = marked.parse(md, {
						mangle: false,
						headerIds: true,
					});
					content.innerHTML = DOMPurify.sanitize(html);

					const h1 = content.querySelector("h1");
					const title =
						(h1 && h1.textContent && h1.textContent.trim()) ||
						path.split("/").pop();
					titleEl.textContent = title;
					document.title = title;
					metaEl.textContent = path;

					// If there's a hash, scroll after render
					const hash = decodeURIComponent(window.location.hash || "");
					if (hash && hash.length > 1) {
						const target = content.querySelector(hash);
						if (target) {
							target.scrollIntoView({
								behavior: "smooth",
								block: "start",
							});
						}
					}
				} catch (err) {
					titleEl.textContent = "Failed to load";
					metaEl.textContent = path;
					content.textContent = "Failed to load article.";
					console.error(err);
				}
			}

			loadArticle();
		</script>
	</body>
</html>
