			rel="stylesheet"
		/>

		<link rel="stylesheet" href="styles/style-certificate.css" />
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="store.html">Store</a></li>
				<li><a href="services.html">Services</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1>Certificates</h1>
				<p>
					Kumpulan sertifikat dan dokumen pelatihan yang sudah saya
					selesaikan.
				</p>
				<div class="hero-buttons">
					<a href="index.html" class="btn btn-secondary">Back Home</a>
					<a href="Curicullum_Vitae.pdf" target="_blank" class="btn btn-primary"
						>Download CV</a
					>
				</div>
			</section>

			<section class="section" id="certificate">
				<div class="section-title-wrapper">
					<h2 class="section-title">Certificate</h2>
				</div>

				<div class="cv-main" id="certList" aria-live="polite">
					<div style="color: var(--muted); font-size: 14px">
						Loading...
					</div>
				</div>
			</section>
		</div>

		<a
			class="wa-float"
			href="https://wa.me/6281371458031"
			target="_blank"
			rel="noreferrer"
			aria-label="Chat via WhatsApp"
			title="WhatsApp"
			><svg
				aria-hidden="true"
				viewBox="0 0 24 24"
				width="24"
				height="24"
				focusable="false"
			>
				<path
					fill="currentColor"
					d="M12 2C6.48 2 2 6.13 2 11.2c0 2.72 1.3 5.16 3.38 6.8L4.5 22l4.1-1.64c1.08.3 2.23.46 3.4.46 5.52 0 10-4.13 10-9.2S17.52 2 12 2zm0 17.2c-1.04 0-2.05-.15-3-.45l-.63-.2-2.43.97.94-2.33-.5-.36C5.5 15.53 4.8 13.44 4.8 11.2 4.8 7.78 8.08 5 12 5s7.2 2.78 7.2 6.2S15.92 19.2 12 19.2z"
				/>
				<path
					fill="currentColor"
					d="M15.67 13.74l-1.1.64c-.27.16-.6.15-.86-.03-1.02-.69-1.95-1.47-2.8-2.33-.86-.86-1.64-1.8-2.33-2.82-.18-.26-.19-.6-.03-.86l.64-1.1c.23-.39.11-.89-.28-1.12L7.1 5.23c-.35-.2-.8-.12-1.06.2-.77.92-1.06 2.2-.72 3.34.86 2.88 2.6 5.6 5.08 8.08 2.48 2.48 5.2 4.22 8.08 5.08 1.14.34 2.42.05 3.34-.72.32-.26.4-.71.2-1.06l-.9-1.57c-.23-.39-.73-.5-1.12-.28l-1.1.64c-.35.2-.78.18-1.11-.06-.58-.42-1.12-.89-1.63-1.4-.51-.51-.98-1.06-1.4-1.63-.24-.33-.26-.76-.06-1.11z"
				/>
			</svg></a
		>

		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			async function loadCertificates() {
				const container = document.getElementById("certList");
				if (!container) return;

				try {
					const res = await fetch("data/certificate.json", {
						cache: "no-store",
					});
					if (!res.ok) throw new Error("Failed to fetch certificate.json");
					const items = await res.json();

					container.innerHTML = "";
					for (const item of items || []) {
						const url = item.url || "#";
						const type = (item.type || "").toUpperCase() || "FILE";

						const card = document.createElement("div");
						card.className = "experience-card";

						const titleWrap = document.createElement("div");
						titleWrap.className = "experience-title";

						const link = document.createElement("a");
						link.href = encodeURI(url);
						link.target = "_blank";
						link.rel = "noreferrer";
						link.textContent = item.title || url;

						titleWrap.appendChild(link);

						const meta = document.createElement("div");
						meta.className = "experience-company";
						meta.textContent = type;

						card.appendChild(titleWrap);
						card.appendChild(meta);
						container.appendChild(card);
					}
				} catch (err) {
					container.innerHTML = "";
					const msg = document.createElement("div");
					msg.style.color = "var(--muted)";
					msg.style.fontSize = "14px";
					msg.textContent = "Failed to load certificates.";
					container.appendChild(msg);
					console.error(err);
				}
			}

			loadCertificates();
		</script>
	</body>
</html>
