<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Certificates</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="styles/style-certificate.css" />
	</head>
	<body>
		<nav class="navbar">
			<div class="navbar-brand">Profile</div>
			<button class="menu-toggle" aria-label="Toggle navigation">
				<span></span>
				<span></span>
				<span></span>
			</button>
			<ul class="navbar-menu">
				<li><a href="index.html">Home</a></li>
				<li><a href="store.html">Store</a></li>
				<li><a href="index.html#contact">Contact</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="hero">
				<h1>Certificates</h1>
				<p>
					Kumpulan sertifikat dan dokumen pelatihan yang sudah saya
					selesaikan.
				</p>
				<div class="hero-buttons">
					<a href="index.html" class="btn btn-secondary">Back Home</a>
					<a href="Curicullum_Vitae.pdf" target="_blank" class="btn btn-primary"
						>Download CV</a
					>
				</div>
			</section>

			<section class="section" id="certificate">
				<div class="section-title-wrapper">
					<h2 class="section-title">Certificate</h2>
				</div>

				<div class="cv-main" id="certList" aria-live="polite">
					<div style="color: var(--muted); font-size: 14px">
						Loading...
					</div>
				</div>
			</section>
		</div>

		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			async function loadCertificates() {
				const container = document.getElementById("certList");
				if (!container) return;

				try {
					const res = await fetch("data/certificate.json", {
						cache: "no-store",
					});
					if (!res.ok) throw new Error("Failed to fetch certificate.json");
					const items = await res.json();

					container.innerHTML = "";
					for (const item of items || []) {
						const url = item.url || "#";
						const type = (item.type || "").toUpperCase() || "FILE";

						const card = document.createElement("div");
						card.className = "experience-card";

						const titleWrap = document.createElement("div");
						titleWrap.className = "experience-title";

						const link = document.createElement("a");
						link.href = encodeURI(url);
						link.target = "_blank";
						link.rel = "noreferrer";
						link.textContent = item.title || url;

						titleWrap.appendChild(link);

						const meta = document.createElement("div");
						meta.className = "experience-company";
						meta.textContent = type;

						card.appendChild(titleWrap);
						card.appendChild(meta);
						container.appendChild(card);
					}
				} catch (err) {
					container.innerHTML = "";
					const msg = document.createElement("div");
					msg.style.color = "var(--muted)";
					msg.style.fontSize = "14px";
					msg.textContent = "Failed to load certificates.";
					container.appendChild(msg);
					console.error(err);
				}
			}

			loadCertificates();
		</script>
	</body>
</html>
