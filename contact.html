<!doctype html>
<html lang="en">

<head>

    <title>CONTACT</title>

    <!-- Fonts -->
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <!-- Start MDBootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.css" rel="stylesheet" />
    <!-- End MDBootstrap -->

    <style>
        * {
            padding: 0;
            margin: 0;
            font-size: 12px;
            letter-spacing: 0.03em;
        }

        html,
        body {
            max-width: 100%;
            overflow: unset;
            margin: 0;
            line-height: inherit;
            height: 100%;
        }

        #wrapper {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .btn-menubar {
            display: flex;
            flex-direction: column;
            -webkit-box-align: center;
            align-items: center;
            --tw-text-opacity: 1;
            color: rgba(30, 136, 229, var(--tw-text-opacity));
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
            width: auto;
            border-style: none;
            padding: 0.75rem;
            background-color: rgba(0, 0, 0, 0);
            font-size: 0.75rem;
            line-height: 1rem;
        }

        .menubar-footer {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin-top: 0px;
            margin-bottom: 0px;
            max-width: 100%;
            --tw-bg-opacity: 1;
            background-color: rgba(255, 255, 255, var(--tw-bg-opacity));
            width: 480px;
            margin: 0rem auto;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .navbar-wrap {
            --tw-bg-opacity: 1;
            background-color: rgba(255, 255, 255, var(--tw-bg-opacity));
            --tw-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
            display: block;
            position: fixed;
            max-width: 100%;
            width: 480px;
            margin-left: auto;
            margin-right: auto;
            left: 0px;
            right: 0px;
            bottom: 0px;
            z-index: 10;
            border-style: solid;
            border-width: 1px 0px 0px;
            --tw-border-opacity: 1;
            border-color: rgba(224, 224, 224, var(--tw-border-opacity));
        }

        .body-wrap {
            background: rgb(255, 255, 255);
            width: 480px;
            max-width: 100%;
            margin: 0px auto;
            height: 100%;
        }

        .body {
            display: flex;
            flex-direction: column;
            flex: 1 1 0%;
        }

        .body-header {
            background: #454e59 !important;
            padding: 5px;
            position: relative;
            width: 480px;
            max-width: 100%;
            z-index: 0;
        }

        .body-header-content {
            color: #fff;
            text-align: center;
            margin: 7px 0px;
        }

        .body-content {
            display: flex;
            -webkit-box-pack: center;
            justify-content: center;
            flex-direction: column;
            /* padding: 0px 16px; */
            padding-top: 15px
        }

        body {
            background-size: cover;
            background-color: #222831 !important;
        }

        .container {
            padding-left: 0px;
            padding-right: 0px;
        }

        .color-2 {
            color: #5f5f5f !important;
        }

        .menu-active {
            color: #f6be17 !important;
        }

        .color-1 {
            color: #454e59 !important;
        }

        .bg-second2 {
            background-color: #f6be17 !important;
        }

        .bg-primary1 {
            background-color: #454e59 !important;
        }

        .bold {
            font-style: bold;
        }

        .line {
            padding-bottom: 5px;
            border-bottom-style: solid;
            border-bottom-width: 3.1px;
            width: fit-content;
        }

        .miring {
            font-style: italic;
        }

        /* .vertical-center {
  right:0;

  -ms-transform: translateY(-50%);
  transform: translateY(-50%);
} */

    #tableProfile tr td {
        padding: 5px;
    }

                <div class="body-content p-2 bg-white">
                    <div class="mt-5" style="margin-bottom: 50px">

                    </div>
                </div>

        </div>
        <nav class="navbar-wrap">
            <div class="menubar-footer">
                <a href="index.html">
                    <button class="btn-menubar">
                        <i class="fa fa-home color-2" style="width: 24px; height: 24px; font-size: 20px"></i>
                        <span class="color-2" style="font-size: 10px">Profile</span>
                    </button>
                </a>
                <a href="resume.html">
                    <button class="btn-menubar" data-mdb-toggle="modal" data-mdb-target="#modalPilihTemplate">

                        <span class="color-2" style="font-size: 10px">Resume</span>
                    </button>
                </a>
                <a href="blog.html">
                    <button class="btn-menubar">
                        <i class="fa fa-pencil color-2" style="width: 24px; height: 24px; font-size: 20px"></i>
                        <span class="color-2" style="font-size: 10px">Blog</span>
                    </button>
                </a>
                <a href="contact.html">
                    <button class="btn-menubar">
                        <i class="fa fa-user color-2" style="width: 24px; height: 24px; font-size: 20px"></i>
                        <span class="color-2" style="font-size: 10px">Contact</span>
                    </button>
                </a>
            </div>
        </nav>
    </div>

    <!-- MDB -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.js"></script>
