		<div class="container">
			<section class="hero">
				<h1>Testimonial</h1>
				<p>
					Kamu bisa kirim testimoni (nama, rating, pesan). Daftar testimoni di
					bawah ini akan diambil dari database.
				</p>
				<div class="hero-buttons">
					<a href="index.html" class="btn btn-secondary">Back Home</a>
					<a
						href="https://wa.me/6281371458031?text=Halo,%20saya%20mau%20kirim%20testimoni."
						target="_blank"
						rel="noreferrer"
						class="btn btn-primary"
						>Chat WhatsApp</a
					>
				</div>

			<section class="section" id="send">
				<div class="section-title-wrapper">
					<h2 class="section-title">Kirim Testimoni</h2>
				</div>

				<div class="panel">
					<form id="testimonialForm" class="tform" novalidate>
						<div class="tform__grid">
							<div>
								<label class="tform__label" for="tName">Nama</label>
								<input
									id="tName"
									name="name"
									class="tform__input"
									autocomplete="name"
									placeholder="Nama kamu"
									maxlength="40"
									required
								/>
							</div>

								<div>
									<div class="rating-wrap">
										<div class="rating-top">
											<label class="tform__label">Rating</label>
											<div
												class="rating-preview"
												id="ratingPreview"
												aria-label="Rating preview"
											></div>
										</div>

										<div class="stars" role="radiogroup" aria-label="Rating">
											<label class="star"
												><input
													type="radio"
													name="rating"
													value="1"
													required
												/>
												<span>1</span></label
											>
											<label class="star"
												><input type="radio" name="rating" value="2" />
												<span>2</span></label
											>
											<label class="star"
												><input type="radio" name="rating" value="3" />
												<span>3</span></label
											>
											<label class="star"
												><input type="radio" name="rating" value="4" />
												<span>4</span></label
											>
											<label class="star"
												><input type="radio" name="rating" value="5" checked />
												<span>5</span></label
											>
										</div>
									</div>
								</div>

							<div class="tform__span2">
								<label class="tform__label" for="tMessage">Pesan</label>
								<textarea
									id="tMessage"
									name="message"
									class="tform__textarea"
									placeholder="Pesan singkat..."
									maxlength="200"
									rows="3"
									required
								></textarea>
							</div>
						</div>

						<div class="tform__actions">
							<div class="tform__msg" id="tMsg"></div>
							<div class="emoji-picker" id="emojiPicker">
								<button
									type="button"
									class="emoji-picker__toggle btn btn-secondary"
									id="emojiToggle"
									aria-expanded="false"
									aria-controls="emojiPanel"
									aria-label="Pilih emoticon"
								>
									&#128522; Emoticon
								</button>
								<div
									class="emoji-picker__panel"
									id="emojiPanel"
									hidden
									role="listbox"
									aria-label="Daftar emoticon"
								></div>
							</div>
							<button type="submit" class="btn btn-primary" id="tSubmit">
								Kirim
							</button>
						</div>
					</form>
				</div>
			</section>

			<section class="section" id="list">
				<div class="section-title-wrapper">
					<h2 class="section-title">Daftar Testimoni</h2>
				</div>

				<div class="panel">
					<div class="list-head">
						<div class="muted" id="countLabel"></div>
						<div class="pager">
							<button class="btn btn-secondary" id="prevBtn" type="button">
								Prev
							</button>
							<div class="pager__info" id="pageInfo">Page 1</div>
							<button class="btn btn-secondary" id="nextBtn" type="button">
								Next
							</button>
						</div>
					</div>

					<div class="tlist" id="tList" aria-live="polite">
						<div class="muted">Loading...</div>
					</div>
				</div>
			</section>
		</div>

		<a
			class="wa-float"
			href="https://wa.me/6281371458031"
			target="_blank"
			rel="noreferrer"
			aria-label="Chat via WhatsApp"
			title="WhatsApp"
			><svg
				aria-hidden="true"
				viewBox="0 0 24 24"
				width="24"
				height="24"
				focusable="false"

				<path
					fill="currentColor"
					d="M12 2C6.48 2 2 6.13 2 11.2c0 2.72 1.3 5.16 3.38 6.8L4.5 22l4.1-1.64c1.08.3 2.23.46 3.4.46 5.52 0 10-4.13 10-9.2S17.52 2 12 2zm0 17.2c-1.04 0-2.05-.15-3-.45l-.63-.2-2.43.97.94-2.33-.5-.36C5.5 15.53 4.8 13.44 4.8 11.2 4.8 7.78 8.08 5 12 5s7.2 2.78 7.2 6.2S15.92 19.2 12 19.2z"

					d="M15.67 13.74l-1.1.64c-.27.16-.6.15-.86-.03-1.02-.69-1.95-1.47-2.8-2.33-.86-.86-1.64-1.8-2.33-2.82-.18-.26-.19-.6-.03-.86l.64-1.1c.23-.39.11-.89-.28-1.12L7.1 5.23c-.35-.2-.8-.12-1.06.2-.77.92-1.06 2.2-.72 3.34.86 2.88 2.6 5.6 5.08 8.08 2.48 2.48 5.2 4.22 8.08 5.08 1.14.34 2.42.05 3.34-.72.32-.26.4-.71.2-1.06l-.9-1.57c-.23-.39-.73-.5-1.12-.28l-1.1.64c-.35.2-.78.18-1.11-.06-.58-.42-1.12-.89-1.63-1.4-.51-.51-.98-1.06-1.4-1.63-.24-.33-.26-.76-.06-1.11z"

		<script>
			document
				.querySelector(".menu-toggle")
				.addEventListener("click", function () {
					const menu = document.querySelector(".navbar-menu");
					menu.classList.toggle("open");
				});

			const SUPABASE_URL = "https://pseurhmszxiltzefptfe.supabase.co";
			const SUPABASE_ANON_KEY = "sb_publishable_L-YJ4bsZZPIzFDeJneXzIA_XGX_tWvg";
			const PAGE_SIZE = 10;
			const TESTIMONIALS_LOCAL_KEY = "testimonials_local_v1";
			const TESTIMONIALS_SUPABASE_CACHE_KEY =
				"testimonials_supabase_cache_v1";
			const TESTIMONIALS_SUPABASE_CACHE_TS_KEY =
				"testimonials_supabase_cache_ts_v1";
			const TESTIMONIALS_SUPABASE_CACHE_LATEST_KEY =
				"testimonials_supabase_cache_latest_v1";
			const TESTIMONIALS_CACHE_MAX_AGE_MS = 60 * 60 * 1000;
			const SUPABASE_REFRESH_MS = 60_000;

			const listEl = document.getElementById("tList");
			const prevBtn = document.getElementById("prevBtn");
			const nextBtn = document.getElementById("nextBtn");
			const pageInfoEl = document.getElementById("pageInfo");
			const countLabelEl = document.getElementById("countLabel");
			const messageEl = document.getElementById("tMessage");
			const emojiPickerEl = document.getElementById("emojiPicker");
			const emojiToggleEl = document.getElementById("emojiToggle");
			const emojiPanelEl = document.getElementById("emojiPanel");

				const formEl = document.getElementById("testimonialForm");
				const msgEl = document.getElementById("tMsg");
				const submitBtn = document.getElementById("tSubmit");
				const ratingPreviewEl = document.getElementById("ratingPreview");
				const EMOJI_OPTIONS = [
					"\u{1F60A}",
					"\u{1F60D}",
					"\u{1F973}",
					"\u{1F44D}",
					"\u{1F44F}",
					"\u{1F525}",
					"\u{1F4AF}",
					"\u{1F91D}",
					"\u{1F64F}",
					"\u{2764}\u{FE0F}",
					"\u{2728}",
					"\u{1F389}",
				];

			let currentPage = 1;
			let totalCount = null;
			let allTestimonials = [];
			let supabaseRefreshIntervalId = null;
			let supabaseRefreshTimeoutId = null;
			let supabaseRefreshInFlight = null;

			function isSupabaseEnabled() {
				return (
					typeof SUPABASE_URL === "string" &&
					SUPABASE_URL.trim() !== "" &&
					typeof SUPABASE_ANON_KEY === "string" &&
					SUPABASE_ANON_KEY.trim() !== ""
				);
			}

			function setMsg(text, kind = "info") {
				msgEl.textContent = text || "";
				msgEl.dataset.kind = kind;
			}

			function readLocalTestimonials() {
				try {
					const raw = localStorage.getItem(TESTIMONIALS_LOCAL_KEY);
					if (!raw) return [];
					const parsed = JSON.parse(raw);
					return Array.isArray(parsed) ? parsed : [];
				} catch {
					return [];
				}
			}

			function writeLocalTestimonials(items) {
				try {
					localStorage.setItem(TESTIMONIALS_LOCAL_KEY, JSON.stringify(items));
				} catch {
					// ignore
				}
			}

			function readSupabaseTestimonialsCache() {
				try {
					const rawItems = localStorage.getItem(TESTIMONIALS_SUPABASE_CACHE_KEY);
					const rawTs = localStorage.getItem(TESTIMONIALS_SUPABASE_CACHE_TS_KEY);
					const latestCreatedAt =
						localStorage.getItem(TESTIMONIALS_SUPABASE_CACHE_LATEST_KEY) || "";
					if (!rawItems || !rawTs) return null;

					const items = JSON.parse(rawItems);
					const ts = Number(rawTs);
					if (!Array.isArray(items) || !Number.isFinite(ts)) return null;

					return { items, ts, latestCreatedAt };
				} catch {
					return null;
				}
			}

			function writeSupabaseTestimonialsCache(items) {
				try {
					const normalizedItems = Array.isArray(items) ? items : [];
					localStorage.setItem(
						TESTIMONIALS_SUPABASE_CACHE_KEY,
						JSON.stringify(normalizedItems),
					);
					localStorage.setItem(
						TESTIMONIALS_SUPABASE_CACHE_TS_KEY,
						String(Date.now()),
					);
					localStorage.setItem(
						TESTIMONIALS_SUPABASE_CACHE_LATEST_KEY,
						getLatestCreatedAt(normalizedItems),
					);
				} catch {
					// ignore
				}
			}

			function isSupabaseCacheFresh(cache) {
				return (
					cache &&
					Number.isFinite(cache.ts) &&
					Date.now() - cache.ts < TESTIMONIALS_CACHE_MAX_AGE_MS
				);
			}

			function setEmojiPanelOpen(isOpen) {
				if (!emojiPanelEl || !emojiToggleEl) return;
				emojiPanelEl.hidden = !isOpen;
				emojiToggleEl.setAttribute("aria-expanded", isOpen ? "true" : "false");
			}

			function insertEmojiIntoMessage(emoji) {
				if (!messageEl || !emoji) return;

				const currentValue = messageEl.value || "";
				const start = Number.isInteger(messageEl.selectionStart)
					? messageEl.selectionStart
					: currentValue.length;
				const end = Number.isInteger(messageEl.selectionEnd)
					? messageEl.selectionEnd
					: currentValue.length;
				const needsSpaceBefore =
					start > 0 && !/\s$/.test(currentValue.slice(0, start));
				const prefix = needsSpaceBefore ? ` ${emoji}` : emoji;
				const nextValue =
					currentValue.slice(0, start) + prefix + currentValue.slice(end);

				messageEl.value = nextValue;
				const caretPosition = start + prefix.length;
				messageEl.focus();
				messageEl.setSelectionRange(caretPosition, caretPosition);
				updateSubmitState();
			}

			function renderEmojiPicker() {
				if (!emojiPanelEl) return;
				emojiPanelEl.innerHTML = "";

				for (const emoji of EMOJI_OPTIONS) {
					const btn = document.createElement("button");
					btn.type = "button";
					btn.className = "emoji-picker__item";
					btn.textContent = emoji;
					btn.setAttribute("aria-label", `Tambah emoticon ${emoji}`);
					btn.addEventListener("click", () => {
						insertEmojiIntoMessage(emoji);
					});
					emojiPanelEl.appendChild(btn);
				}
			}

				function clampRating(value) {
					const n = Number(value);
					if (!Number.isFinite(n)) return 5;
					return Math.max(1, Math.min(5, Math.round(n)));
				}

				function getCurrentRatingValue() {
					return (
						formEl?.querySelector('input[name="rating"]:checked')?.value ?? ""
					);
				}

				function updateSubmitState() {
					if (!submitBtn) return;
					const name = String(document.getElementById("tName")?.value || "").trim();
					const message = String(
						document.getElementById("tMessage")?.value || "",
					).trim();
					const rating = String(getCurrentRatingValue() || "").trim();
					submitBtn.disabled = !(name && message && rating);

					if (ratingPreviewEl) {
						ratingPreviewEl.textContent = rating
							? stars(rating)
							: "\u2606\u2606\u2606\u2606\u2606";
					}
				}

				function stars(rating) {
					const r = clampRating(rating);
					return "\u2605".repeat(r) + "\u2606".repeat(5 - r);
				}

			function normalizeTestimonial(item) {
				const name = String(item?.name || "").trim();
				const message = String(item?.message || "").trim();
				const rating = Number(item?.rating);
				const createdAt = String(item?.created_at || item?.createdAt || "").trim();

				if (!name || !message) return null;

				return {
					name,
					message,
					rating: Number.isFinite(rating) ? clampRating(rating) : 5,
					createdAt,
				};
			}

			function dedupeTestimonials(items) {
				const seen = new Set();
				return (Array.isArray(items) ? items : [])
					.map(normalizeTestimonial)
					.filter(Boolean)
					.filter((item) => {
						const key = `${item.name}::${item.message}::${item.createdAt}`;
						if (seen.has(key)) return false;
						seen.add(key);
						return true;
					});
			}

			function getLatestCreatedAt(items) {
				for (const item of Array.isArray(items) ? items : []) {
					const createdAt = String(
						item?.createdAt || item?.created_at || "",
					).trim();
					if (createdAt) return createdAt;
				}
				return "";
			}

			function applyTestimonials(items) {
				allTestimonials = dedupeTestimonials(items);
				totalCount = allTestimonials.length;
				const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
				currentPage = Math.min(Math.max(1, currentPage), totalPages);
				renderCurrentPage();
			}

			function renderCurrentPage() {
				const start = (currentPage - 1) * PAGE_SIZE;
				renderList(allTestimonials.slice(start, start + PAGE_SIZE));
				updatePager();
			}

			function renderList(items) {
				listEl.innerHTML = "";
				if (!items.length) {
					const empty = document.createElement("div");
					empty.className = "muted";
					empty.textContent = "Belum ada testimonial.";
					listEl.appendChild(empty);
					return;
				}

				for (const it of items) {
					const card = document.createElement("article");
					card.className = "titem";

					const head = document.createElement("div");
					head.className = "titem__head";

					const name = document.createElement("div");
					name.className = "titem__name";
					name.textContent = it.name || "Anonymous";

					const rating = document.createElement("div");
					rating.className = "titem__stars";
					rating.textContent = stars(it.rating);

					head.appendChild(name);
					head.appendChild(rating);

					const msg = document.createElement("div");
					msg.className = "titem__msg";
					msg.textContent = it.message || "";

					card.appendChild(head);
					card.appendChild(msg);
					listEl.appendChild(card);
				}
			}

			function updatePager() {
				pageInfoEl.textContent = `Page ${currentPage}`;
				const totalPages =
					typeof totalCount === "number"
						? Math.max(1, Math.ceil(totalCount / PAGE_SIZE))
						: null;

				prevBtn.disabled = currentPage <= 1;
				nextBtn.disabled = totalPages ? currentPage >= totalPages : false;

				if (typeof totalCount === "number") {
					countLabelEl.textContent = `${totalCount} testimonial`;
				} else {
					countLabelEl.textContent = isSupabaseEnabled()
						? "Supabase enabled"
						: "Supabase belum di-setup";
				}
			}

				function parseTotalCountFromContentRange(header) {
					// e.g. "0-9/123" or "*/123"
					if (!header) return null;
					const parts = String(header).split("/");
					if (parts.length !== 2) return null;
					const total = Number(parts[1]);
					return Number.isFinite(total) ? total : null;
				}

				function escapeHtml(str) {
					return String(str || "")
						.replaceAll("&", "&amp;")
						.replaceAll("<", "&lt;")
						.replaceAll(">", "&gt;")
						.replaceAll('"', "&quot;")
						.replaceAll("'", "&#39;");
				}

				async function readResponseBody(res) {
					let text = "";
					try {
						text = await res.text();
					} catch {
						return "";
					}

					const ct = res.headers.get("content-type") || "";
					if (!ct.includes("application/json")) return text;
					try {
						const j = JSON.parse(text);
						return (
							j?.message ||
							j?.msg ||
							j?.error_description ||
							j?.error ||
							text
						);
					} catch {
						return text;
					}
				}

				async function fetchAllSupabaseTestimonials() {
					const base = SUPABASE_URL.replace(/\/+$/, "");
					const url =
						`${base}/rest/v1/testimonials` +
						`?select=name,message,rating,created_at` +
						`&order=created_at.desc`;
					let res = await fetch(url, {
						headers: {
							apikey: SUPABASE_ANON_KEY,
							Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
						},
						cache: "no-store",
					});
					if (!res.ok) {
						const body = await readResponseBody(res);
						const maybeMissingCreatedAt =
							res.status === 400 && /created_at/i.test(String(body || ""));

						if (maybeMissingCreatedAt) {
							res = await fetch(`${base}/rest/v1/testimonials?select=name,message,rating,created_at`, {
								headers: {
									apikey: SUPABASE_ANON_KEY,
									Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
								},
								cache: "no-store",
							});
						}
					}

					if (!res.ok) {
						const body = await readResponseBody(res);
						throw new Error(
							`Supabase fetch failed (${res.status}). ${body || "No details."}`,
						);
					}

					const items = await res.json();
					return Array.isArray(items) ? items : [];
				}

				async function fetchLatestSupabaseCreatedAt() {
					const base = SUPABASE_URL.replace(/\/+$/, "");
					const url =
						`${base}/rest/v1/testimonials` +
						`?select=created_at&order=created_at.desc&limit=1`;
					const res = await fetch(url, {
						headers: {
							apikey: SUPABASE_ANON_KEY,
							Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
						},
						cache: "no-store",
					});

					if (!res.ok) {
						const body = await readResponseBody(res);
						throw new Error(
							`Supabase latest-check failed (${res.status}). ${body || "No details."}`,
						);
					}

					const items = await res.json();
					if (!Array.isArray(items) || items.length === 0) return "";
					return String(items[0]?.created_at || "").trim();
				}

			async function refreshTestimonialsFromSupabase(force = false) {
				if (!isSupabaseEnabled()) return null;
				if (supabaseRefreshInFlight && !force) return supabaseRefreshInFlight;

				supabaseRefreshInFlight = (async () => {
					const items = await fetchAllSupabaseTestimonials();
					writeSupabaseTestimonialsCache(items);
					applyTestimonials(items);
					scheduleSupabaseRefresh();
					return items;
				})();

				try {
					return await supabaseRefreshInFlight;
				} finally {
					supabaseRefreshInFlight = null;
				}
			}

			async function checkForNewTestimonials() {
				if (!isSupabaseEnabled()) return;

				try {
					const latestRemoteCreatedAt = await fetchLatestSupabaseCreatedAt();
					const cache = readSupabaseTestimonialsCache();
					const latestCachedCreatedAt = String(
						cache?.latestCreatedAt || getLatestCreatedAt(cache?.items || []),
					).trim();

					if (
						latestRemoteCreatedAt &&
						latestRemoteCreatedAt !== latestCachedCreatedAt
					) {
						await refreshTestimonialsFromSupabase(true);
					}
				} catch {
					// ignore background check failures
				}
			}

			function scheduleSupabaseRefresh() {
				clearInterval(supabaseRefreshIntervalId);
				clearTimeout(supabaseRefreshTimeoutId);

				if (!isSupabaseEnabled()) return;

				const cache = readSupabaseTestimonialsCache();
				const cacheAgeMs = cache ? Date.now() - cache.ts : TESTIMONIALS_CACHE_MAX_AGE_MS;
				const ttlRemainingMs = Math.max(
					0,
					TESTIMONIALS_CACHE_MAX_AGE_MS - cacheAgeMs,
				);

				supabaseRefreshTimeoutId = setTimeout(() => {
					refreshTestimonialsFromSupabase(true).catch(() => {
						// ignore timed refresh failures
					});
				}, ttlRemainingMs);

				supabaseRefreshIntervalId = setInterval(() => {
					checkForNewTestimonials();
				}, SUPABASE_REFRESH_MS);
			}

			async function initializeTestimonials() {
				listEl.innerHTML = `<div class="muted">Loading...</div>`;

				try {
					if (isSupabaseEnabled()) {
						const cache = readSupabaseTestimonialsCache();
						if (cache) {
							applyTestimonials(cache.items || []);
							scheduleSupabaseRefresh();
						}

						if (!cache || !isSupabaseCacheFresh(cache)) {
							await refreshTestimonialsFromSupabase(true);
						}
					} else {
						applyTestimonials(readLocalTestimonials());
					}
				} catch (err) {
					console.error(err);
					const msg = String(err?.message || err || "Unknown error");
					listEl.innerHTML =
						`<div class="muted">Gagal memuat testimonial.</div>` +
						`<div class="hint" style="margin-top:10px">` +
						`<div><code>${escapeHtml(msg)}</code></div>` +
						`<div style="margin-top:6px">Cek: (1) table <code>public.testimonials</code> ada, (2) RLS policy untuk <code>SELECT</code> mengizinkan role <code>public</code>, (3) jalankan lewat server (Laragon/Live Server/GitHub Pages), jangan <code>file://</code>.</div>` +
						`</div>`;
					updatePager();
				}
			}

			function loadPage(page) {
				currentPage = Math.max(1, page);
				renderCurrentPage();
			}

			prevBtn.addEventListener("click", () => loadPage(currentPage - 1));
			nextBtn.addEventListener("click", () => loadPage(currentPage + 1));

				formEl.addEventListener("submit", async (e) => {
					e.preventDefault();
					const fd = new FormData(formEl);
					const name = String(fd.get("name") || "").trim();
					const message = String(fd.get("message") || "").trim();
					const ratingRaw = fd.get("rating");
					if (!ratingRaw) {
						setMsg("Rating wajib dipilih.", "error");
						updateSubmitState();
						return;
					}
					const rating = clampRating(ratingRaw);

					if (!name || !message) {
						setMsg("Nama dan pesan wajib diisi.", "error");
						updateSubmitState();
						return;
					}

					submitBtn.disabled = true;
					setMsg("Mengirim...", "info");

					try {
						if (isSupabaseEnabled()) {
							const base = SUPABASE_URL.replace(/\/+$/, "");
							const url = `${base}/rest/v1/testimonials`;
							const payload = { name, message, rating };

							const res = await fetch(url, {
								method: "POST",
								headers: {
									apikey: SUPABASE_ANON_KEY,
									Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
									"Content-Type": "application/json",
									Prefer: "return=minimal",
								},
								body: JSON.stringify(payload),
							});

							if (!res.ok) {
								const body = await readResponseBody(res);
								throw new Error(
									`Supabase insert failed (${res.status}). ${body || "No details."}`,
								);
							}
							await refreshTestimonialsFromSupabase(true);
						} else {
							const local = readLocalTestimonials();
							local.unshift({
								name,
								message,
								rating,
								createdAt: new Date().toISOString(),
							});
							writeLocalTestimonials(local.slice(0, 60));
							applyTestimonials(local);
						}

						formEl.reset();
						setMsg("Terima kasih! Testimoni terkirim.", "ok");
						updateSubmitState();
						loadPage(1);
					} catch (err) {
						console.error(err);
						const msg = String(err?.message || err || "");
						setMsg(
							`Gagal mengirim. ${msg ? `(${msg})` : "Coba lagi ya."}`,
							"error",
						);
					} finally {
						updateSubmitState();
					}
				});

				formEl.addEventListener("input", updateSubmitState);
				formEl.addEventListener("change", updateSubmitState);
				emojiToggleEl?.addEventListener("click", () => {
					setEmojiPanelOpen(emojiPanelEl?.hidden);
				});
				document.addEventListener("click", (e) => {
					if (!emojiPickerEl?.contains(e.target)) {
						setEmojiPanelOpen(false);
					}
				});
				document.addEventListener("keydown", (e) => {
					if (e.key === "Escape") {
						setEmojiPanelOpen(false);
					}
				});
				renderEmojiPicker();
				updateSubmitState();

				initializeTestimonials();
			</script>
	</body>
</html>
